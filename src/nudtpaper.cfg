% nudtpaper.cfg
% 参考文献格式配置文件 (基于 GB/T 7714-2005 标准)
% 2026-04-17 修改版

\ProvidesFile{nudtpaper.cfg}[2026/04/17 Custom bibliography style for NUDT Paper v2.0]

% 设置参考文献排序方式：按顺序编码 (与文中引用顺序一致)
\ExecuteBibliographyOptions{
  sorting=none,
  bibstyle=gb7714-2015,
  citestyle=gb7714-2015,
  gbnamefmt=lowercase,
  gbpub=false,
  gbpunctin=true,
  maxnames=3,      % 最多显示3个作者
  minnames=1,      % 最少显示1个作者
  date=year,       % 只显示年份
}

% 覆盖 gb7714-2015 样式的部分设置，以完全符合 GB/T 7714-2005 格式
\DeclareStyleSourcemap{
  \maps[datatype=bibtex]{
    % 将 bibtex 字段映射到 biblatex 字段
    \map{
      \step[fieldsource=editor, fieldtarget=usera]
      \step[fieldsource=address, fieldtarget=location]
      \step[fieldsource=publisher, fieldtarget=institution]
    }
    \map{
      \step[fieldsource=series, fieldtarget=userc]
      \step[fieldsource=howpublished, fieldtarget=note]
    }
  }
}

% 定义中文文献类型的显示标签 (符合GB/T 7714-2005)
\DefineBibliographyStrings{english}{
  january = {1月},
  february = {2月},
  march = {3月},
  april = {4月},
  may = {5月},
  june = {6月},
  july = {7月},
  august = {8月},
  september = {9月},
  october = {10月},
  november = {11月},
  december = {12月},
  and = {,},           % 改为中文逗号
  andmore = {, 等},
  editor = {, 编},
  editors = {, 编},
  volume = {卷},
  number = {期},
  patent = {专利},
  version = {版},
  mathesis = {硕士学位论文},
  phdthesis = {博士学位论文},
  pages = {页},
  page = {页},
  chapter = {章},
  edition = {版},
  url = {[EB/OL]},
  urlfrom = {获取自},
  urlseen = {访问日期},
  in = {见},
  byeditor = {, 编},
  incollection = {论文集},
  inbook = {专著},
  inproceedings = {会议录},
  misc = {Z},          % 未定义类型文献
  online = {EB/OL},
  standard = {S},
  techreport = {R},
  manual = {Z},
  patent = {P},
  thesis = {D},
  report = {R},
  article = {J},
  book = {M},
  newspaper = {N},
  conference = {C},
  legislation = {Z},
}

% 修改作者分隔符为中文格式
\DeclareDelimFormat{multinamedelim}{\addcomma\addspace}
\DeclareDelimFormat{finalnamedelim}{\addcomma\addspace}
\DeclareDelimFormat[bib]{andothersdelim}{\addcomma\addspace}
\DeclareDelimAlias{andothersdelim}{multinamedelim}

% 自定义页码分隔符为"~"
\DefineBibliographyExtras{english}{\renewcommand*{\bibrangedash}{~}}
\DefineBibliographyExtras{chinese}{\renewcommand*{\bibrangedash}{~}}

% 自定义格式命令
\DeclareFieldFormat[article]{title}{#1}  % 移除引号
\DeclareFieldFormat[book]{title}{#1}     % 移除斜体
\DeclareFieldFormat{journaltitle}{#1}
\DeclareFieldFormat{booktitle}{#1}
\DeclareFieldFormat{pages}{#1}
\DeclareFieldFormat{number}{(#1)}        % 期号括号
\DeclareFieldFormat{volume}{#1}          % 卷号
\DeclareFieldFormat{date}{#1}            % 年份
\DeclareFieldFormat{location}{#1}       % 出版地
\DeclareFieldFormat{publisher}{#1}      % 出版社
\DeclareFieldFormat{pages}{#1}          % 页码

\DeclareDelimFormat{postnotedelim}{\addcolon\addspace}
\DeclareDelimFormat[bib]{namedelim}{\addperiod\addspace}
\DeclareDelimFormat[bib]{nametitledelim}{\addperiod\addspace}

% 定义不同文献类型的输出驱动
\DeclareBibliographyDriver{article}{%
  \usebibmacro{bibindex}%
  \usebibmacro{begentry}%
  \usebibmacro{author/translator+others}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{title}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{journal+issuetitle}%
  \setunit{\addcomma\addspace}%
  \usebibmacro{volume+number+pages}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{doi+url}%
  \setunit{\addperiod}\newblock
  \usebibmacro{finentry}%
}

\DeclareBibliographyDriver{book}{%
  \usebibmacro{bibindex}%
  \usebibmacro{begentry}%
  \usebibmacro{author/editor+others/translator+others}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{maintitle+title}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{publisher+location+date}%
  \setunit{\addcolon\addspace}%
  \usebibmacro{pages}%
  \setunit{\addperiod}\newblock
  \usebibmacro{doi+url}%
  \setunit{\addperiod}\newblock
  \usebibmacro{finentry}%
}

\DeclareBibliographyDriver{inproceedings}{%
  \usebibmacro{bibindex}%
  \usebibmacro{begentry}%
  \usebibmacro{author/translator+others}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{title}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{in:}%
  \usebibmacro{editor+others}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{maintitle+booktitle}%
  \setunit{\labelnamepunct}\newblock
  \usebibmacro{event+venue+date}%
  \setunit{\addperiod}\newblock
  \usebibmacro{publisher+location}%
  \setunit{\addcolon\addspace}%
  \usebibmacro{pages}%
  \setunit{\addperiod}\newblock
  \usebibmacro{doi+url}%
  \setunit{\addperiod}\newblock
  \usebibmacro{finentry}%
}

% 学位论文驱动
\DeclareBibliographyDriver{thesis}{%
